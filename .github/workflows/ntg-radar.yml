name: NTG Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: ntg-radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.NTG_GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.NTG_GITHUB_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install NTG deps
        run: |
          python -m pip install --upgrade pip
          pip install -r bounty_missions/tools/ntg/requirements.txt

      - name: Install Codex CLI
        run: |
          npm install -g @openai/codex

      - name: Ensure helper scripts are executable
        run: |
          chmod +x bounty_missions/tools/ntg/run_codex_fix.sh

      - name: Run NTG service
        run: |
          python bounty_missions/tools/ntg/service.py --config bounty_missions/tools/ntg/service.github.yaml

      - name: Upload radar artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ntg-radar-out
          path: bounty_missions/tools/ntg/out/github
          if-no-files-found: ignore

      - name: Persist lightweight NTG state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            bounty_missions/tools/ntg/out/github/current_queue.json \
            bounty_missions/tools/ntg/out/github/mission_queue.md \
            bounty_missions/tools/ntg/out/github/run_summary.json \
            bounty_missions/tools/ntg/out/github/changes_summary.json \
            bounty_missions/tools/ntg/out/github/learned_reputation.json \
            bounty_missions/tools/ntg/out/github/service_state.json \
            bounty_missions/tools/ntg/out/github/alerts/latest_alert.json \
            bounty_missions/tools/ntg/out/github/alerts/latest_alert.md || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(ntg): refresh radar state"
            git push
          fi
